<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>


<div id="gesture-layer" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none;">
  <video id="input_video" style="display:none;"></video>
  <canvas id="output_canvas" style="width: 100%; height: 100%; transform: scaleX(-1);"></canvas>
</div>

<div id="debug-container" style="position: fixed; bottom: 20px; right: 20px; width: 320px; height: 180px; border: 2px solid #555; background: #000; z-index: 10000;">
  <canvas id="debug_canvas" style="width: 100%; height: 100%; transform: scaleX(-1);"></canvas>
  <div style="position: absolute; top: 5px; left: 5px; color: white; background: rgba(0,0,0,0.5); font-size: 12px; padding: 2px 5px;">Debug View</div>
</div>

<iframe 
  id="game-iframe" 
  src="index.html" 
  width="1920" 
  height="850" 
  frameborder="0" 
  allow="autoplay">
</iframe>

  <script>
    // 繞過 Hexo 網頁安全設定 (不然不能玩)
    window.lockdown = () => {};
    window.SES = { enabled: false };

    // 鏡頭部分
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    let isDrawing = false;
    let path = [];
    let pathColor = "rgba(200, 150, 255, 0.6)"; //紫色軌跡
    let successTimeout = null; // 用於重設顏色的計時器

    let smoothedIndex = { x: 0.5, y: 0.5 };
    const smoothingFactor = 0.25; //smooth index

    // Debug Canvas
    const debugCanvas = document.getElementById('debug_canvas');
    const debugCtx = debugCanvas.getContext('2d');

    // 模擬函式 (掛載到 window 確保全域可用)
    window.dispatchMouseEvent = function(target, type, x, y) {
        const iframeWindow = document.getElementById('game-iframe').contentWindow;
        const ev = new MouseEvent(type, {
            view: iframeWindow,
            bubbles: true,
            cancelable: true,
            clientX: x,
            clientY: y,
            button: 0,
            buttons: 1,
            which: 1
        });
        target.dispatchEvent(ev);
    };

    window.simulateStroke = function(points) {
    if (points.length < 2) return;

    const iframe = document.getElementById('game-iframe');
    const gameCanvas = iframe.contentDocument.querySelector('canvas');
    const rect = iframe.getBoundingClientRect();

    const getPos = (p) => {
        return {
            x: rect.left + ((1 - p.x) * rect.width),
            y: rect.top + (p.y * rect.height)
        };
    }; //鏡像!!!

    const lastPoint = points[points.length - 1];
    const endPos = getPos(lastPoint);

    //按下滑鼠
    const startPos = getPos(points[0]);
    dispatchMouseEvent(gameCanvas, 'mousedown', startPos.x, startPos.y);

    //移動 (中間過程)
    points.forEach((p) => {
        const pos = getPos(p);
        dispatchMouseEvent(gameCanvas, 'mousemove', pos.x, pos.y);
    });

    //在放開前，確保座標停留在終點
    //發送一個額外的 mousemove 確保遊戲引擎「定格」在終點
    dispatchMouseEvent(gameCanvas, 'mousemove', endPos.x, endPos.y);

    //稍微延遲8 ms再放開
    setTimeout(() => {
        dispatchMouseEvent(gameCanvas, 'mouseup', endPos.x, endPos.y);
        console.log("符咒施放完成");
    }, 8); 
};

    //符咒辨識邏輯
    window.recognizeShape = function(points) {
    console.log("嘗試辨識符咒，總點數:", points.length);

    //防止隨意晃動觸發
    if (points.length < 4) { //點數越多越精準，但需要畫越長
        console.log("點數太少，不辨識。");
        return;
    }

    /*使用相對極值，不用靠x/y軸 */
    const startPoint = points[0];
    const endPoint = points[points.length - 1];

    // 找出路徑中的最高點與最低點 (Y 軸) 以及左右極限 (X 軸)
    let minX = 1, maxX = 0, minY = 1, maxY = 0;
    points.forEach(p => {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
    });

    const totalDx = maxX - minX;
    const totalDy = maxY - minY;
    const distStartEnd = Math.hypot(startPoint.x - endPoint.x, startPoint.y - endPoint.y);

    let shape = "Unknown";

    // 愛心
    // 起點終點接近，底部明顯低於起點
    if (distStartEnd < 0.2 && maxY > startPoint.y + 0.2) {
        shape = "Heart";
    }
    // 各種奇怪的 V
    // 最低點<<起點；寬度>0.12
    else if (maxY > startPoint.y + 0.12 && totalDx > 0.12 && totalDy > 0.12) {
        shape = "V-Shape";
    }
    // 顛倒的 V
    // 最高點>>起點；寬度>0.12
    else if (minY < startPoint.y - 0.12 && totalDx > 0.12 && totalDy > 0.12) {
        shape = "Inverted-V";
    }
    // 閃電
    // 有明顯的折返，不論順序
    // 中點超越起點與終點的寬度
    else if (totalDx > 0.2 && totalDy > 0.3) {
        const midIdx = Math.floor(points.length / 2);
        if ((points[midIdx].x > maxX * 0.8 && endPoint.x < startPoint.x) || 
            (points[midIdx].x < minX * 1.2 && endPoint.x > startPoint.x)) {
            shape = "Lightning";
        }
    }
    // 橫線
    // 寬度夠長，可以斜著畫
    else if (totalDx > 0.2 && totalDy < totalDx * 0.8) {
        shape = "Horizontal";
    }
    // 直線
    else if (totalDy > 0.25 && totalDx < totalDy * 0.8) {
        shape = "Vertical";
    }

    if (shape !== "Unknown") {
        console.log(`%c 成功辨識符咒: lighting `, "background: #1a1a1a; color: #ffeb3b; font-size: 24px; padding: 5px; border-radius: 5px;");
        pathColor = "rgba(144, 238, 144, 0.9)";
        simulateStroke(points);
        clearTimeout(successTimeout);
        successTimeout = setTimeout(() => {
            pathColor = "rgba(200, 150, 255, 0.6)";
            path = []; // 清空路徑
        }, 500);
    } else {
        setTimeout(() => { path = []; }, 100);
        console.log(`未辨識出符咒，總 Dx: ${totalDx.toFixed(2)}, Dy: ${totalDy.toFixed(2)}`);
    }
};

    //MediaPipe設定
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults((results) => {
        //Game Canvas Size
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

        // Debug Canvas Size
        debugCanvas.width = videoElement.videoWidth;
        debugCanvas.height = videoElement.videoHeight;
        debugCtx.save();

        debugCtx.drawImage(results.image, 0, 0, debugCanvas.width, debugCanvas.height);

        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            const indexTip = landmarks[8]; //手的節點編號
            const thumbTip = landmarks[4];

            // Debug canvas 中的標記
            const activeLandmarks = [4, 8];
            activeLandmarks.forEach(idx => {
            const point = landmarks[idx];
            const x = point.x * debugCanvas.width;
            const y = point.y * debugCanvas.height;

            // Draw a dot
            debugCtx.beginPath();
            debugCtx.arc(x, y, 8, 0, 2 * Math.PI);
            debugCtx.fillStyle = (idx === 8) ? "#00FF00" : "#FF0000"; // 食指綠色，拇指紅色
            debugCtx.fill();
            debugCtx.strokeStyle = "white";
            debugCtx.lineWidth = 5;
            debugCtx.stroke();
            });

            // Draw a line
            const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
            if (dist < 0.2) { 
                debugCtx.beginPath();
                debugCtx.setLineDash([5, 5]); // 虛線
                debugCtx.moveTo(indexTip.x * debugCanvas.width, indexTip.y * debugCanvas.height);
                debugCtx.lineTo(thumbTip.x * debugCanvas.width, thumbTip.y * debugCanvas.height);
                debugCtx.strokeStyle = dist < 0.1 ? "yellow" : "white"; // 捏合成功變黃色
                debugCtx.lineWidth = 5;
                debugCtx.stroke();
                debugCtx.setLineDash([]); // 恢復實線
    }

            //平滑化
            // 公式：新位置 = (舊位置 * (1 - 平滑係數)) + (感測位置 * 平滑係數)
            smoothedIndex.x = smoothedIndex.x * (1 - smoothingFactor) + indexTip.x * smoothingFactor;
            smoothedIndex.y = smoothedIndex.y * (1 - smoothingFactor) + indexTip.y * smoothingFactor;

            // 計算距離，原始點位判斷比較沒延遲
            const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
            const pressed = distance < 0.1;
        
            if (pressed) {
                if (!isDrawing) { isDrawing = true; path = []; pathColor = "rgba(200, 150, 255, 0.6)";}
                path.push({ x: indexTip.x, y: indexTip.y });
            } else {
                if (isDrawing) { isDrawing = false; recognizeShape(path); }
            }

            // --- 繪製軌跡 ---
            if (path.length > 1) {
                canvasCtx.beginPath();
                canvasCtx.lineWidth = 10;
                canvasCtx.lineCap = "round";
                canvasCtx.lineJoin = "round";
                canvasCtx.strokeStyle = pathColor;
                canvasCtx.moveTo(path[0].x * canvasElement.width, path[0].y * canvasElement.height);
                for (let i = 1; i < path.length; i++) {
                    canvasCtx.lineTo(path[i].x * canvasElement.width, path[i].y * canvasElement.height);
                }
                canvasCtx.stroke();
            }

            canvasCtx.beginPath();
            canvasCtx.arc(indexTip.x * canvasElement.width, indexTip.y * canvasElement.height, 10, 0, 2 * Math.PI);
            canvasCtx.fillStyle = pressed ? "#FFEB3B" : "#FFFFFF";
            canvasCtx.shadowBlur = 10;
            canvasCtx.shadowColor = pressed ? "rgba(255, 235, 59, 0.8)" : "rgba(255, 255, 255, 0.5)";
            canvasCtx.fill();
        }
        canvasCtx.restore();
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280,
        height: 720
    });
    camera.start();
</script>
